<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.2.4/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>

        <h1 class="text-5xl">Landing Page</h1>

    <main class="container mx-auto p-4 mt-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-gray-800 rounded-lg p-4 hover:bg-gray-700">
                <h2 class="text-2xl">Feature 1</h2>
                <p class="text-lg">Description 1</p>
                <i class="fas fa-rocket text-3xl"></i>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 hover:bg-gray-700">
                <h2 class="text-2xl">Feature 2</h2>
                <p class="text-lg">Description 2</p>
                <i class="fas fa-lock text-3xl"></i>
            </div>
            <div class="bg-gray-800 rounded-lg p-4 hover:bg-gray-700">
                <h2 class="text-2xl">Feature 3</h2>
                <p class="text-lg">Description 3</p>
                <i class="fas fa-cog text-3xl"></i>
            </div>
        </div>
    </main>
    <footer class="bg-gray-900 py-4 text-white text-center">
        <p>&copy; 2023 Landing Page</p>
    </footer>

</html>
